---
- name: "Master Infrastructure Configuration"
  hosts: localhost
  become: yes

  tasks:
    # ==========================================================================
    # BLOCK 1: DATABASE TIER (PostgreSQL)
    # ==========================================================================
    - name: "Database Logic"
      when: ansible_local.tags.Role == "database"
      block:
        - name: "1. Install Postgres and Python Dependencies"
          apt:
            name: ["postgresql", "postgresql-contrib", "python3-psycopg2"]
            state: present
            update_cache: yes

        - name: "2. Ensure Postgres Service is Running"
          service:
            name: postgresql
            state: started
            enabled: yes

        - name: "3. Create the Owner User"
          become_user: postgres
          community.postgresql.postgresql_user:
            name: "devops_meezoh_user"
            password: "AdminPassword123"
            role_attr_flags: "CREATEDB,LOGIN"

        - name: "4. Create the Read-Only User"
          become_user: postgres
          community.postgresql.postgresql_user:
            name: "readonly_user"
            password: "ReadPassword123"

        - name: "5. Create the Main Application Database"
          become_user: postgres
          community.postgresql.postgresql_db:
            name: "devops_db"

        - name: "6. Grant ALL Privileges to Owner User"
          become_user: postgres
          community.postgresql.postgresql_privs:
            database: devops_db
            roles: devops_meezoh_user
            type: database
            privs: ALL

        - name: "7. Grant SELECT Privileges to Read-Only User"
          become_user: postgres
          community.postgresql.postgresql_privs:
            database: devops_db
            schema: public
            objs: ALL_IN_SCHEMA
            type: table
            roles: readonly_user
            privs: SELECT

    # ==========================================================================
    # BLOCK 2: WEB WORKER TIER (Nginx)
    # ==========================================================================
    - name: "Web Worker Logic"
      when: ansible_local.tags.Role == "web-worker"
      block:
        - name: "1. Install Nginx Web Server"
          apt:
            name: "nginx"
            state: present
            update_cache: yes

        - name: "2. Generate Dynamic Landing Page"
          copy:
            # We use 'ansible_env' to pull the DB_HOST we injected via Terraform
            content: |
              <!DOCTYPE html>
              <html>
              <head><title>Worker Node Active</title></head>
              <body>
                <h1>Meezoh's Infrastructure: Node Active</h1>
                <hr>
                <p><b>Worker Hostname:</b> {{ ansible_hostname }}</p>
                <p><b>Target Database:</b> {{ ansible_env.DB_HOST | default('Searching...') }}</p>
                <p><b>Status:</b> Ansible Configuration Successful</p>
              </body>
              </html>
            dest: /var/www/html/index.html
            mode: '0644'
          notify: "Restart Nginx"

  # ============================================================================
  # HANDLERS: Only run if a task 'notifies' them
  # ============================================================================
  handlers:
    - name: "Restart Nginx"
      service:
        name: nginx
        state: restarted